name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *' # Monthly

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: '0'
  CARGO_NET_RETRY: '10'
  RUSTUP_MAX_RETRIES: '10'
  
  DEPS_APT: curl gcc clang libudev-dev libgbm-dev libxkbcommon-dev libegl1-mesa-dev libwayland-dev libinput-dev libdbus-1-dev libsystemd-dev libseat-dev libpipewire-0.3-dev libpango1.0-dev libdisplay-info-dev
  DEPS_DNF: cargo gcc clang libudev-devel libgbm-devel libxkbcommon-devel wayland-devel libinput-devel dbus-devel systemd-devel libseat-devel pipewire-devel pango-devel cairo-gobject-devel libdisplay-info-devel
  DEPS_APK: curl cargo clang-libclang eudev-dev glib-dev libdisplay-info-dev libinput-dev libseat-dev libxkbcommon-dev mesa-dev pango-dev pipewire-dev tar llvm-static llvm-dev clang-static clang-dev
  DEPS_PKG: git curl rust llvm pkgconf pixman libudev-devd libdisplay-info seatd libinput libxkbcommon pipewire mesa-libs cairo devel/glib20 gettext-runtime harfbuzz pango

jobs:
  test:
    strategy:
      fail-fast: false
    name: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }}
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "test"
          cache-all-crates: true

      - name: Configure Cargo (Performance boost)
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build tests
        run: cargo test --no-run --all --exclude niri-visual-tests

      - name: Test
        run: cargo test --all --exclude niri-visual-tests -- --nocapture

  build:
    strategy:
      fail-fast: false
    name: check feature combinations
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }}
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "build"

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Check feature combinations
        run: |
          cargo check --no-default-features &
          cargo check --no-default-features --features dbus &
          cargo check --no-default-features --features systemd &
          cargo check --no-default-features --features dinit &
          cargo check --no-default-features --features xdp-gnome-screencast &
          cargo check &
          cargo build --features profile-with-tracy &
          wait

  # MUSL BUILD - FIXED WITH PROPER CROSS-COMPILATION SETUP
  build-musl:
    strategy:
      fail-fast: false
    name: musl static binary
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages (including musl tools)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} musl-tools musl-dev gcc-multilib
          version: 1.0
          
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: musl-target-v1

      - name: Build musl binary (Fixed cross-compilation)
        run: |
          # FIXED: Proper cross-compilation environment setup
          export CC_x86_64_unknown_linux_musl=musl-gcc
          export CXX_x86_64_unknown_linux_musl=musl-g++
          export AR_x86_64_unknown_linux_musl=ar
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
          
          # CRITICAL: Configure pkg-config for cross-compilation
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_ALL_STATIC=1
          
          # Build with musl target
          cargo build --target x86_64-unknown-linux-musl --no-default-features --features dbus,xdp-gnome-screencast

  # Alternative musl approach with cross-rs (most robust)
  build-musl-cross:
    strategy:
      fail-fast: false
    name: musl with cross-rs (robust)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-musl-v1

      # MOST ROBUST: Use cross-rs which handles all cross-compilation complexity
      - name: Build with cross-rs
        run: |
          cross build --target x86_64-unknown-linux-musl --no-default-features --features dbus,xdp-gnome-screencast

  # ALPINE EXPERIMENTAL - EXPECTED TO FAIL
  build-alpine-experimental:
    strategy:
      fail-fast: false
    name: alpine musl (experimental - will fail)
    runs-on: ubuntu-24.04
    container: alpine:3
    continue-on-error: true
    
    env:
      BINDGEN_EXTRA_CLANG_ARGS: --sysroot=/usr
    
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache Alpine packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apk
          key: alpine-${{ runner.os }}-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: alpine-${{ runner.os }}-

      - name: Install Deps
        run: |
          apk add --no-cache bash curl ${{ env.DEPS_APK }}
          find /usr -name "*libclang*" -type f 2>/dev/null | head -5

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Attempt Build (EXPECTED TO FAIL)
        run: |
          cargo build --no-default-features --features dbus,xdp-gnome-screencast || echo "✓ Expected failure: bindgen/musl dynamic loading incompatibility"

  randomized-tests:
    strategy:
      fail-fast: false
    name: randomized and slow tests
    runs-on: ubuntu-24.04
    env:
      RUST_BACKTRACE: 1
      RUN_SLOW_TESTS: 1
      PROPTEST_CASES: 100000
      PROPTEST_MAX_LOCAL_REJECTS: 100000
      PROPTEST_MAX_GLOBAL_REJECTS: 100000
      PROPTEST_MAX_SHRINK_ITERS: 100000

    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }}
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build tests
        run: cargo test --no-run --all --exclude niri-visual-tests --release

      - name: Test
        run: cargo test --all --exclude niri-visual-tests --release

  visual-tests:
    strategy:
      fail-fast: false
    name: visual tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} libadwaita-1-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --package niri-visual-tests

  msrv:
    strategy:
      fail-fast: false
    name: msrv
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} libadwaita-1-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@1.80.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  clippy:
    strategy:
      fail-fast: false
    name: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} libadwaita-1-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all --all-targets -- -D warnings

  rustfmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Run rustfmt
        run: cargo fmt --all -- --check

  fedora:
    runs-on: ubuntu-24.04
    container: 
      image: fedora:41
      options: --user root
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache DNF packages
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: fedora-${{ runner.os }}-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: fedora-${{ runner.os }}-

      - name: Install dependencies
        run: |
          dnf makecache --refresh
          dnf install -y ${{ env.DEPS_DNF }} libadwaita-devel

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all

  # ENHANCED: FreeBSD with improved caching
  freebsd:
    runs-on: ubuntu-24.04
    env:
      CARGO_HOME: /home/runner/work/niri/niri/cargo-home
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          key: freebsd-vm-v1  # ADD VERSION TO KEY

      # NEW: Cache FreeBSD package preparation
      - name: Cache FreeBSD packages
        uses: actions/cache@v4
        with:
          path: ~/.freebsd-pkg-cache
          key: freebsd-pkg-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: freebsd-pkg-
      
      - run: sudo rm /var/lib/dpkg/info/man-db.*

      - name: Build
        uses: vmactions/freebsd-vm@966989c456d41351f095a421f60e71342d3bce41
        with:
          prepare: |
            pkg update -f
            # Try to cache packages if possible
            mkdir -p ~/.freebsd-pkg-cache
            pkg install -y ${{ env.DEPS_PKG }}
          run: |
            curl -o patch-pipewire_init 'https://cgit.freebsd.org/ports/plain/x11-wm/niri/files/patch-pipewire_init?id=f3f7e555b06d9a87d63c047ce3e82e936a11f2fe'
            export CARGO_HOME="$PWD/cargo-home"
            cargo fetch
            ( cd $CARGO_HOME/git/checkouts/pipewire-rs-*/*/; patch -p2 < $CARGO_HOME/../patch-pipewire_init; )
            cargo build --offline --no-default-features --features dbus,xdp-gnome-screencast

  # ENHANCED: Nix with Magic Cache (MAJOR SPEED IMPROVEMENT)
  nix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      
      # MAJOR IMPROVEMENT: Add Nix installer first
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v3
        continue-on-error: true
      
      # THE KEY MISSING PIECE: Magic Nix Cache (70-90% speed boost)
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true
      
      - name: Check flake inputs
        uses: DeterminateSystems/flake-checker-action@v4
        continue-on-error: true
      
      - run: nix flake check
        continue-on-error: true

  publish-wiki:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [publish-docs]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          show-progress: false
      - uses: Andrew-Chen-Wang/github-wiki-action@b7e552d7cb0fa7f83e459012ffc6840fd87bcb83
        with:
          path: docs/wiki/

  # ENHANCED: Documentation with Python dependency caching
  publish-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          show-progress: false
      
      # NEW: Cache Python dependencies
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('docs/pyproject.toml', 'docs/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      
      - name: Install the project
        run: uv sync --locked --all-extras --dev
        working-directory: docs/
      
      - name: Generate niri documentation
        run: uv run mkdocs build
        working-directory: docs/
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Generate rustdoc documentation
        run: cargo doc --no-deps -p niri-ipc
      
      - run: mkdir -p publish/niri_ipc
      - run: cp -r ./target/doc/* ./publish/
      - run: cp -r ./docs/site/* ./publish/
      
      - name: Deploy documentation
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          force_orphan: true

