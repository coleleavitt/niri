name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *' # Monthly

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: '0'
  CARGO_NET_RETRY: '10'
  RUSTUP_MAX_RETRIES: '10'
  
  DEPS_APT: curl gcc clang libudev-dev libgbm-dev libxkbcommon-dev libegl1-mesa-dev libwayland-dev libinput-dev libdbus-1-dev libsystemd-dev libseat-dev libpipewire-0.3-dev libpango1.0-dev libdisplay-info-dev
  DEPS_DNF: cargo gcc clang libudev-devel libgbm-devel libxkbcommon-devel wayland-devel libinput-devel dbus-devel systemd-devel libseat-devel pipewire-devel pango-devel cairo-gobject-devel libdisplay-info-devel
  DEPS_PKG: git curl rust llvm pkgconf pixman libudev-devd libdisplay-info seatd libinput libxkbcommon pipewire mesa-libs cairo devel/glib20 gettext-runtime harfbuzz pango

jobs:
  test:
    strategy:
      fail-fast: false
    name: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }}
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "test"
          cache-all-crates: true

      - name: Configure Cargo (Performance boost)
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build tests
        run: cargo test --no-run --all --exclude niri-visual-tests

      - name: Test
        run: cargo test --all --exclude niri-visual-tests -- --nocapture

  build:
    strategy:
      fail-fast: false
    name: check feature combinations
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }}
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "build"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Check feature combinations
        run: |
          cargo check --no-default-features &
          cargo check --no-default-features --features dbus &
          cargo check --no-default-features --features systemd &
          cargo check --no-default-features --features dinit &
          cargo check --no-default-features --features xdp-gnome-screencast &
          cargo check &
          cargo build --features profile-with-tracy &
          wait

  # APPROACH 1: Native Alpine Linux with musl (BEST for complex dependencies)
  alpine-native:
    strategy:
      fail-fast: false
    name: alpine musl (native)
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.19
      options: --user root
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      # FIXED: Create cache directory before cache action (like Fedora fix)
      - name: Prep Alpine cache dir
        run: mkdir -p /var/cache/apk

      - name: Cache Alpine packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apk
          key: alpine-apk-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: alpine-apk-

      - name: Install Alpine dependencies
        run: |
          apk update
          apk add --no-cache \
            curl gcc musl-dev pkgconfig git \
            dbus-dev eudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          source ~/.cargo/env
          echo 'source ~/.cargo/env' >> ~/.profile

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-alpine"
          shared-key: "alpine-native"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          source ~/.cargo/env
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build minimal musl binary (native musl)
        run: |
          source ~/.cargo/env
          # Native musl build (no cross-compilation needed!)
          cargo build --no-default-features --features dbus --verbose

  # APPROACH 2: Cross-rs (BEST for professional CI)
  alpine-cross:
    strategy:
      fail-fast: false
    name: alpine musl (cross-rs)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross-rs
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-cross"
          shared-key: "alpine-cross"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Create Cross.toml for musl
        run: |
          cat > Cross.toml << 'EOF'
          [target.x86_64-unknown-linux-musl]
          image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:edge"
          
          [build.env]
          passthrough = [
              "CARGO_INCREMENTAL",
              "CARGO_NET_RETRY",
              "RUSTUP_MAX_RETRIES",
          ]
          EOF

      - name: Build with cross-rs (handles all complexity)
        run: |
          # Cross-rs handles musl + dependencies automatically
          cross build --target x86_64-unknown-linux-musl --no-default-features --features dbus --verbose

  # APPROACH 3: Ubuntu with static linking bypass (FALLBACK)
  alpine-minimal:
    strategy:
      fail-fast: false  
    name: alpine musl (minimal features)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: musl-tools musl-dev gcc curl pkg-config
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-musl-minimal"
          shared-key: "alpine-minimal"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build ultra-minimal musl binary
        run: |
          export CC_x86_64_unknown_linux_musl=musl-gcc
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
          
          # Ultra-minimal: just the core compositor without GUI libraries
          cargo build --target x86_64-unknown-linux-musl --no-default-features --bin niri --verbose

  randomized-tests:
    strategy:
      fail-fast: false
    name: randomized and slow tests
    runs-on: ubuntu-24.04
    env:
      RUST_BACKTRACE: 1
      RUN_SLOW_TESTS: 1
      PROPTEST_CASES: 100000
      PROPTEST_MAX_LOCAL_REJECTS: 100000
      PROPTEST_MAX_GLOBAL_REJECTS: 100000
      PROPTEST_MAX_SHRINK_ITERS: 100000

    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }}
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "randomized"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build tests
        run: cargo test --no-run --all --exclude niri-visual-tests --release

      - name: Test
        run: cargo test --all --exclude niri-visual-tests --release

  visual-tests:
    strategy:
      fail-fast: false
    name: visual tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} libadwaita-1-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "visual"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --package niri-visual-tests

  msrv:
    strategy:
      fail-fast: false
    name: msrv
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} libadwaita-1-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@1.80.1
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-msrv"
          shared-key: "msrv"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - run: cargo check --all-targets

  clippy:
    strategy:
      fail-fast: false
    name: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} libadwaita-1-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "clippy"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Run clippy
        run: cargo clippy --all --all-targets -- -D warnings

  rustfmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Run rustfmt
        run: cargo fmt --all -- --check

  fedora:
    runs-on: ubuntu-24.04
    container: 
      image: fedora:41
      options: --user root
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      # FIXED: Create cache directory before cache action
      - name: Prep dnf cache dir
        run: mkdir -p /var/cache/dnf

      - name: Cache DNF packages
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: fedora-dnf-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: fedora-dnf-

      - name: Install dependencies
        run: |
          dnf makecache --refresh
          dnf install -y ${{ env.DEPS_DNF }} libadwaita-devel

      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-fedora"
          shared-key: "fedora"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - run: cargo build --all

  # FIXED: FreeBSD with proper cache directory setup (like Fedora)
  freebsd:
    runs-on: ubuntu-24.04
    env:
      CARGO_HOME: /home/runner/work/niri/niri/cargo-home
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-freebsd"
          shared-key: "freebsd"
          cache-all-crates: true

      # FIXED: Create FreeBSD cache directories OUTSIDE VM (like Fedora fix)
      - name: Prep FreeBSD cache directories
        run: |
          mkdir -p ~/.freebsd-base-system
          mkdir -p ~/.freebsd-pkg-cache
          mkdir -p ~/.freebsd-ports-cache
          mkdir -p ~/.freebsd-cargo-cache
          mkdir -p ~/.freebsd-target-cache
          mkdir -p ~/.freebsd-rust-cache

      # Multi-layer VM caching strategy (now directories exist!)
      - name: Cache FreeBSD VM Environment (Layer 1 - Base System)
        uses: actions/cache@v4
        with:
          path: ~/.freebsd-base-system
          key: freebsd-base-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: freebsd-base-${{ runner.os }}-

      - name: Cache FreeBSD Packages (Layer 2 - Packages)
        uses: actions/cache@v4
        with:
          path: |
            ~/.freebsd-pkg-cache
            ~/.freebsd-ports-cache
          key: freebsd-pkg-${{ hashFiles('DEPS_PKG') }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            freebsd-pkg-${{ hashFiles('DEPS_PKG') }}-
            freebsd-pkg-

      - name: Cache FreeBSD Build Artifacts (Layer 3 - Build Cache)
        uses: actions/cache@v4
        with:
          path: |
            ~/.freebsd-cargo-cache
            ~/.freebsd-target-cache
            ~/.freebsd-rust-cache
          key: freebsd-build-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            freebsd-build-${{ hashFiles('Cargo.lock') }}-
            freebsd-build-

      - run: sudo rm /var/lib/dpkg/info/man-db.*

      - name: Build with ULTIMATE VM caching
        uses: vmactions/freebsd-vm@966989c456d41351f095a421f60e71342d3bce41
        with:
          mem: 4096
          cpu: 4
          prepare: |
            echo "=== Setting up FreeBSD base system ==="
            
            # FIXED: Directories now exist outside VM
            if [ -f ~/.freebsd-base-system/.initialized ]; then
              echo "✓ Using cached base system"
            else
              echo "⚡ Initializing base system"
              sysctl kern.maxfiles=65536 2>/dev/null || true
              sysctl kern.maxfilesperproc=32768 2>/dev/null || true
              touch ~/.freebsd-base-system/.initialized
            fi
            
            echo "=== Managing FreeBSD packages ==="
            export PKG_CACHEDIR=~/.freebsd-pkg-cache
            
            if [ -f ~/.freebsd-pkg-cache/.deps_installed ]; then
              echo "✓ Using cached packages"
              pkg info -q git curl rust llvm || NEED_INSTALL=1
            else
              NEED_INSTALL=1
            fi
            
            if [ "$NEED_INSTALL" = "1" ]; then
              echo "⚡ Installing packages"
              pkg update -f
              pkg install -y ${{ env.DEPS_PKG }}
              pkg info > ~/.freebsd-pkg-cache/installed-packages.txt
              touch ~/.freebsd-pkg-cache/.deps_installed
              echo "📦 Installed $(pkg info | wc -l) packages"
            fi
            
          run: |
            echo "=== FreeBSD Build Process ==="
            
            export CARGO_HOME="$PWD/cargo-home"
            
            # FIXED: Restore from pre-existing directories
            if [ -d ~/.freebsd-cargo-cache ] && [ -n "$(ls -A ~/.freebsd-cargo-cache 2>/dev/null)" ]; then
              echo "✓ Restoring Cargo cache"
              cp -r ~/.freebsd-cargo-cache/* "$CARGO_HOME/" 2>/dev/null || true
            fi
            
            if [ -d ~/.freebsd-target-cache ] && [ -n "$(ls -A ~/.freebsd-target-cache 2>/dev/null)" ]; then
              echo "✓ Restoring target cache"
              mkdir -p target
              cp -r ~/.freebsd-target-cache/* target/ 2>/dev/null || true
            fi
            
            curl -o patch-pipewire_init 'https://cgit.freebsd.org/ports/plain/x11-wm/niri/files/patch-pipewire_init?id=f3f7e555b06d9a87d63c047ce3e82e936a11f2fe'
            
            export CARGO_BUILD_JOBS=4
            export RUSTC_WRAPPER=""
            export CARGO_TARGET_DIR="$PWD/target"
            
            echo "⚡ Fetching dependencies"
            cargo fetch
            
            echo "⚡ Applying patches"
            ( cd $CARGO_HOME/git/checkouts/pipewire-rs-*/*/; patch -p2 < $CARGO_HOME/../patch-pipewire_init; )
            
            echo "⚡ Building project"
            cargo build --offline --no-default-features --features dbus,xdp-gnome-screencast
            
            echo "💾 Saving comprehensive build cache"
            
            # FIXED: Save to pre-existing directories
            if [ -d "$CARGO_HOME" ]; then
              rm -rf ~/.freebsd-cargo-cache/* 2>/dev/null || true
              cp -r "$CARGO_HOME"/* ~/.freebsd-cargo-cache/ 2>/dev/null || true
              echo "✓ Saved Cargo cache ($(du -sh ~/.freebsd-cargo-cache 2>/dev/null | cut -f1))"
            fi
            
            if [ -d target ]; then
              rm -rf ~/.freebsd-target-cache/* 2>/dev/null || true
              cp -r target/* ~/.freebsd-target-cache/ 2>/dev/null || true
              echo "✓ Saved target cache ($(du -sh ~/.freebsd-target-cache 2>/dev/null | cut -f1))"
            fi
            
            echo "🎉 FreeBSD build completed successfully!"

  nix:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v3
        continue-on-error: true
      
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true
      
      - name: Check flake inputs
        uses: DeterminateSystems/flake-checker-action@v4
        continue-on-error: true
      
      - run: nix flake check
        continue-on-error: true

  publish-wiki:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [publish-docs]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          show-progress: false
      - uses: Andrew-Chen-Wang/github-wiki-action@b7e552d7cb0fa7f83e459012ffc6840fd87bcb83
        with:
          path: docs/wiki/

  publish-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          show-progress: false
      
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('docs/pyproject.toml', 'docs/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      
      - name: Install the project
        run: uv sync --locked --all-extras --dev
        working-directory: docs/
      
      - name: Generate niri documentation
        run: uv run mkdocs build
        working-directory: docs/
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Generate rustdoc documentation
        run: cargo doc --no-deps -p niri-ipc
      
      - run: mkdir -p publish/niri_ipc
      - run: cp -r ./target/doc/* ./publish/
      - run: cp -r ./docs/site/* ./publish/
      
      - name: Deploy documentation
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          force_orphan: true

