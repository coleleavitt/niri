name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *' # Monthly

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: '0'
  CARGO_NET_RETRY: '10'
  RUSTUP_MAX_RETRIES: '10'
  
  DEPS_APT: curl gcc clang libudev-dev libgbm-dev libxkbcommon-dev libegl1-mesa-dev libwayland-dev libinput-dev libdbus-1-dev libsystemd-dev libseat-dev libpipewire-0.3-dev libpango1.0-dev libdisplay-info-dev
  DEPS_DNF: cargo gcc clang libudev-devel libgbm-devel libxkbcommon-devel wayland-devel libinput-devel dbus-devel systemd-devel libseat-devel pipewire-devel pango-devel cairo-gobject-devel libdisplay-info-devel
  DEPS_PKG: git curl rust llvm pkgconf pixman libudev-devd libdisplay-info seatd libinput libxkbcommon pipewire mesa-libs cairo devel/glib20 gettext-runtime harfbuzz pango

jobs:
  test:
    strategy:
      fail-fast: false
    name: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }}
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "test"
          cache-all-crates: true

      - name: Configure Cargo (Performance boost)
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build tests
        run: cargo test --no-run --all --exclude niri-visual-tests

      - name: Test
        run: cargo test --all --exclude niri-visual-tests -- --nocapture

  build:
    strategy:
      fail-fast: false
    name: check feature combinations
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }}
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "build"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Check feature combinations
        run: |
          cargo check --no-default-features &
          cargo check --no-default-features --features dbus &
          cargo check --no-default-features --features systemd &
          cargo check --no-default-features --features dinit &
          cargo check --no-default-features --features xdp-gnome-screencast &
          cargo check &
          cargo build --features profile-with-tracy &
          wait

  randomized-tests:
    strategy:
      fail-fast: false
    name: randomized and slow tests
    runs-on: ubuntu-24.04
    env:
      RUST_BACKTRACE: 1
      RUN_SLOW_TESTS: 1
      PROPTEST_CASES: 100000
      PROPTEST_MAX_LOCAL_REJECTS: 100000
      PROPTEST_MAX_GLOBAL_REJECTS: 100000
      PROPTEST_MAX_SHRINK_ITERS: 100000

    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }}
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "randomized"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build tests
        run: cargo test --no-run --all --exclude niri-visual-tests --release

      - name: Test
        run: cargo test --all --exclude niri-visual-tests --release

  visual-tests:
    strategy:
      fail-fast: false
    name: visual tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} libadwaita-1-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "visual"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --package niri-visual-tests

  msrv:
    strategy:
      fail-fast: false
    name: msrv
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} libadwaita-1-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@1.80.1
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-msrv"
          shared-key: "msrv"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - run: cargo check --all-targets

  clippy:
    strategy:
      fail-fast: false
    name: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} libadwaita-1-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "clippy"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Run clippy
        run: cargo clippy --all --all-targets -- -D warnings

  rustfmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Run rustfmt
        run: cargo fmt --all -- --check

  fedora:
    runs-on: ubuntu-24.04
    container: 
      image: fedora:41
      options: --user root
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Prep dnf cache dir
        run: mkdir -p /var/cache/dnf

      - name: Cache DNF packages
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: fedora-dnf-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: fedora-dnf-

      - name: Install dependencies
        run: |
          dnf makecache --refresh
          dnf install -y ${{ env.DEPS_DNF }} libadwaita-devel

      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-fedora"
          shared-key: "fedora"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - run: cargo build --all

  # SIMPLIFIED: FreeBSD using official vmactions approach with proper caching
  freebsd:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-freebsd"
          shared-key: "freebsd"
          cache-all-crates: true

      # Create cache directories for vmactions to use
      - name: Prep FreeBSD cache directories
        run: |
          mkdir -p ~/.freebsd-pkg-cache
          mkdir -p ~/.freebsd-cargo-cache
          mkdir -p ~/.freebsd-target-cache

      # Cache FreeBSD packages
      - name: Cache FreeBSD packages
        uses: actions/cache@v4
        with:
          path: ~/.freebsd-pkg-cache
          key: freebsd-pkg-${{ hashFiles('.github/workflows/ci.yml') }}-${{ env.DEPS_PKG }}
          restore-keys: freebsd-pkg-

      # Cache Rust build artifacts  
      - name: Cache FreeBSD Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.freebsd-cargo-cache
            ~/.freebsd-target-cache
          key: freebsd-rust-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('src/**/*.rs') }}
          restore-keys: |
            freebsd-rust-${{ hashFiles('Cargo.lock') }}-
            freebsd-rust-

      - run: sudo rm /var/lib/dpkg/info/man-db.*

      # SIMPLIFIED: Use official vmactions/freebsd-vm approach
      - name: Build in FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          mem: 4096
          cpu: 4
          usesh: true
          copyback: false  # Don't copy files back (we only need build success)
          prepare: |
            # Restore cached packages if available
            if [ -d ~/.freebsd-pkg-cache ] && [ -f ~/.freebsd-pkg-cache/.deps_installed ]; then
              echo "✓ Using cached FreeBSD packages"
            else
              echo "⚡ Installing FreeBSD packages"
              pkg update -f
              pkg install -y ${{ env.DEPS_PKG }}
              mkdir -p ~/.freebsd-pkg-cache
              touch ~/.freebsd-pkg-cache/.deps_installed
              echo "📦 Packages installed and cached"
            fi

          run: |
            echo "=== FreeBSD Rust Build with Proper Caching ==="
            
            # Set up Rust environment
            export CARGO_HOME="$HOME/.cargo"
            export CARGO_TARGET_DIR="$PWD/target"
            
            # Restore Rust caches if available
            if [ -d ~/.freebsd-cargo-cache ]; then
              echo "✅ Restoring Cargo cache"
              cp -r ~/.freebsd-cargo-cache/* "$CARGO_HOME/" 2>/dev/null || true
            fi
            
            if [ -d ~/.freebsd-target-cache ]; then
              echo "🚀 Restoring target cache (compiled artifacts)"
              mkdir -p target
              cp -r ~/.freebsd-target-cache/* target/ 2>/dev/null || true
            fi
            
            # Download pipewire patch
            curl -o patch-pipewire_init 'https://cgit.freebsd.org/ports/plain/x11-wm/niri/files/patch-pipewire_init?id=f3f7e555b06d9a87d63c047ce3e82e936a11f2fe'
            
            # Fetch dependencies
            echo "⚡ Fetching Rust dependencies"
            cargo fetch
            
            # Apply patches  
            echo "⚡ Applying FreeBSD patches"
            ( cd $CARGO_HOME/git/checkouts/pipewire-rs-*/*/; patch -p2 < $PWD/patch-pipewire_init; )
            
            # Build with incremental compilation
            echo "🔨 Building niri for FreeBSD"
            export CARGO_INCREMENTAL=1
            cargo build --offline --no-default-features --features dbus,xdp-gnome-screencast --verbose
            
            # Save caches for next run
            echo "💾 Saving caches"
            rm -rf ~/.freebsd-cargo-cache/* ~/.freebsd-target-cache/* 2>/dev/null || true
            cp -r "$CARGO_HOME"/* ~/.freebsd-cargo-cache/ 2>/dev/null || true
            cp -r target/* ~/.freebsd-target-cache/ 2>/dev/null || true
            
            echo "🎉 FreeBSD build completed successfully!"

  # OPTIMIZED: Nix with comprehensive caching
  nix:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      
      # OPTIMIZED: Additional Nix store caching
      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            ~/.nix-profile
            /nix/store
          key: nix-store-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-keys: |
            nix-store-${{ runner.os }}-${{ hashFiles('flake.nix') }}
            nix-store-${{ runner.os }}-
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v3
        with:
          # OPTIMIZED: Enable additional Nix features
          extra-conf: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
            max-jobs = auto
            cores = 0
            # Enable better parallelism
            build-users-group = nixbld
        continue-on-error: true
      
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          # OPTIMIZED: Enable diagnostic mode for better debugging
          diagnostic-endpoint: ""
          listen: "0.0.0.0:37515"
        continue-on-error: true
      
      # OPTIMIZED: Cache flake inputs separately
      - name: Cache Nix flake inputs  
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix-eval-cache
            ~/.local/share/nix
          key: nix-flake-inputs-${{ hashFiles('flake.lock') }}
          restore-keys: nix-flake-inputs-
      
      - name: Check flake inputs
        uses: DeterminateSystems/flake-checker-action@v4
        with:
          # OPTIMIZED: Fail on insecure or broken flakes
          fail-mode: true
        continue-on-error: true
      
      # OPTIMIZED: More comprehensive flake operations
      - name: Nix flake check with optimizations
        run: |
          # Enable more parallelism and better caching
          export NIX_CONFIG="max-jobs = auto
          cores = 0  
          experimental-features = nix-command flakes
          keep-outputs = true
          keep-derivations = true"
          
          # Check flake health and build
          echo "🔍 Checking flake inputs and outputs..."
          nix flake check --print-build-logs --verbose
          
          # Optionally build specific outputs for better caching
          echo "🚀 Building main derivation..."  
          nix build --print-build-logs --verbose
        continue-on-error: true

  publish-wiki:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [publish-docs]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          show-progress: false
      - uses: Andrew-Chen-Wang/github-wiki-action@b7e552d7cb0fa7f83e459012ffc6840fd87bcb83
        with:
          path: docs/wiki/

  publish-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          show-progress: false
      
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('docs/pyproject.toml', 'docs/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      
      - name: Install the project
        run: uv sync --locked --all-extras --dev
        working-directory: docs/
      
      - name: Generate niri documentation
        run: uv run mkdocs build
        working-directory: docs/
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Generate rustdoc documentation
        run: cargo doc --no-deps -p niri-ipc
      
      - run: mkdir -p publish/niri_ipc
      - run: cp -r ./target/doc/* ./publish/
      - run: cp -r ./docs/site/* ./publish/
      
      - name: Deploy documentation
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          force_orphan: true

