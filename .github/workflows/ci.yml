name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *' # Monthly

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: '0'
  CARGO_NET_RETRY: '10'
  RUSTUP_MAX_RETRIES: '10'
  
  DEPS_APT: curl gcc clang libudev-dev libgbm-dev libxkbcommon-dev libegl1-mesa-dev libwayland-dev libinput-dev libdbus-1-dev libsystemd-dev libseat-dev libpipewire-0.3-dev libpango1.0-dev libdisplay-info-dev
  DEPS_DNF: cargo gcc clang libudev-devel libgbm-devel libxkbcommon-devel wayland-devel libinput-devel dbus-devel systemd-devel libseat-devel pipewire-devel pango-devel cairo-gobject-devel libdisplay-info-devel
  DEPS_PKG: git curl rust llvm pkgconf pixman libudev-devd libdisplay-info seatd libinput libxkbcommon pipewire mesa-libs cairo devel/glib20 gettext-runtime harfbuzz pango

jobs:
  test:
    strategy:
      fail-fast: false
    name: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }}
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "test"
          cache-all-crates: true

      - name: Configure Cargo (Performance boost)
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build tests
        run: cargo test --no-run --all --exclude niri-visual-tests

      - name: Test
        run: cargo test --all --exclude niri-visual-tests -- --nocapture

  build:
    strategy:
      fail-fast: false
    name: check feature combinations
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }}
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "build"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Check feature combinations
        run: |
          cargo check --no-default-features &
          cargo check --no-default-features --features dbus &
          cargo check --no-default-features --features systemd &
          cargo check --no-default-features --features dinit &
          cargo check --no-default-features --features xdp-gnome-screencast &
          cargo check &
          cargo build --features profile-with-tracy &
          wait

  alpine:
    strategy:
      fail-fast: false
    name: alpine musl static binary
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages (including musl tools and static libraries)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} musl-tools musl-dev gcc-multilib pkg-config
          version: 1.0
          
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-musl"
          shared-key: "alpine"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build musl static binary
        run: |
          # Proper cross-compilation environment setup
          export CC_x86_64_unknown_linux_musl=musl-gcc
          export CXX_x86_64_unknown_linux_musl=musl-g++
          export AR_x86_64_unknown_linux_musl=ar
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
          
          # Configure pkg-config for cross-compilation (simplified approach)
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_ALL_STATIC=1
          
          # Set library paths for musl
          export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig"
          export PKG_CONFIG_LIBDIR="/usr/lib/x86_64-linux-gnu/pkgconfig"
          
          # Build with musl target
          cargo build --target x86_64-unknown-linux-musl --no-default-features --features dbus,xdp-gnome-screencast

  randomized-tests:
    strategy:
      fail-fast: false
    name: randomized and slow tests
    runs-on: ubuntu-24.04
    env:
      RUST_BACKTRACE: 1
      RUN_SLOW_TESTS: 1
      PROPTEST_CASES: 100000
      PROPTEST_MAX_LOCAL_REJECTS: 100000
      PROPTEST_MAX_GLOBAL_REJECTS: 100000
      PROPTEST_MAX_SHRINK_ITERS: 100000

    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }}
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "randomized"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build tests
        run: cargo test --no-run --all --exclude niri-visual-tests --release

      - name: Test
        run: cargo test --all --exclude niri-visual-tests --release

  visual-tests:
    strategy:
      fail-fast: false
    name: visual tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} libadwaita-1-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "visual"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --package niri-visual-tests

  msrv:
    strategy:
      fail-fast: false
    name: msrv
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} libadwaita-1-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@1.80.1
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-msrv"
          shared-key: "msrv"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - run: cargo check --all-targets

  clippy:
    strategy:
      fail-fast: false
    name: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.DEPS_APT }} libadwaita-1-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "clippy"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - name: Run clippy
        run: cargo clippy --all --all-targets -- -D warnings

  rustfmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Run rustfmt
        run: cargo fmt --all -- --check

  fedora:
    runs-on: ubuntu-24.04
    container: 
      image: fedora:41
      options: --user root
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Cache DNF packages
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: fedora-dnf-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: fedora-dnf-

      - name: Install dependencies
        run: |
          dnf makecache --refresh
          dnf install -y ${{ env.DEPS_DNF }} libadwaita-devel

      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-fedora"
          shared-key: "fedora"
          cache-all-crates: true

      - name: Configure Cargo
        run: |
          echo "[registries.crates-io]" >> ~/.cargo/config.toml
          echo "protocol = \"sparse\"" >> ~/.cargo/config.toml

      - run: cargo build --all

  freebsd:
    runs-on: ubuntu-24.04
    env:
      CARGO_HOME: /home/runner/work/niri/niri/cargo-home
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-freebsd"
          shared-key: "freebsd"
          cache-all-crates: true

      - run: sudo rm /var/lib/dpkg/info/man-db.*

      - name: Build
        uses: vmactions/freebsd-vm@966989c456d41351f095a421f60e71342d3bce41
        with:
          prepare: |
            pkg update -f
            pkg install -y ${{ env.DEPS_PKG }}
          run: |
            curl -o patch-pipewire_init 'https://cgit.freebsd.org/ports/plain/x11-wm/niri/files/patch-pipewire_init?id=f3f7e555b06d9a87d63c047ce3e82e936a11f2fe'
            export CARGO_HOME="$PWD/cargo-home"
            cargo fetch
            ( cd $CARGO_HOME/git/checkouts/pipewire-rs-*/*/; patch -p2 < $CARGO_HOME/../patch-pipewire_init; )
            cargo build --offline --no-default-features --features dbus,xdp-gnome-screencast

  nix:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v3
        continue-on-error: true
      
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true
      
      - name: Check flake inputs
        uses: DeterminateSystems/flake-checker-action@v4
        continue-on-error: true
      
      - run: nix flake check
        continue-on-error: true

  publish-wiki:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [publish-docs]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          show-progress: false
      - uses: Andrew-Chen-Wang/github-wiki-action@b7e552d7cb0fa7f83e459012ffc6840fd87bcb83
        with:
          path: docs/wiki/

  publish-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          show-progress: false
      
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('docs/pyproject.toml', 'docs/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      
      - name: Install the project
        run: uv sync --locked --all-extras --dev
        working-directory: docs/
      
      - name: Generate niri documentation
        run: uv run mkdocs build
        working-directory: docs/
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Generate rustdoc documentation
        run: cargo doc --no-deps -p niri-ipc
      
      - run: mkdir -p publish/niri_ipc
      - run: cp -r ./target/doc/* ./publish/
      - run: cp -r ./docs/site/* ./publish/
      
      - name: Deploy documentation
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          force_orphan: true

